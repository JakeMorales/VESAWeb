name: PR Check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx ng build --configuration production

      # ChromeHeadlessNoSandbox is a custom launcher defined in karma.conf.cjs.
      # The .cjs extension is required because package.json uses "type": "module" (ESM),
      # which would cause Node to reject a plain .js file that uses module.exports.
      # angular.json's test architect options point to karma.conf.cjs via "karmaConfig".
      - name: Test (headless Chrome, no sandbox)
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox
