<div class="elo-leaderboard-container">
  <h2>🏅 Player ELO Leaderboard</h2>
  <div *ngIf="loadingLeaderboard">Loading leaderboard...</div>
  <div *ngIf="leaderboardError">{{leaderboardError}}</div>
  <table *ngIf="!loadingLeaderboard && !leaderboardError && leaderboard.length > 0" class="elo-leaderboard-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>ELO</th>
        <th>Games Played</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let player of leaderboard; let i = index">
        <td>{{i + 1}}</td>
        <td>{{player.playerName}}</td>
        <td>{{player.finalElo || player.estimatedElo}}</td>
        <td>{{player.totalGames}}</td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="!loadingLeaderboard && !leaderboardError && leaderboard.length === 0">
    No players found.
  </div>
</div>
