<div class="games-container">
  <div class="header-section">
    <h1>VESA Scrimmages & League Archive</h1>
    <p>Pick-up scrimmages and comprehensive league match history</p>
    
    <!-- View Mode Switcher -->
    <div class="view-switcher">
      <button 
        class="view-btn" 
        [class.active]="viewMode === 'current'"
        (click)="switchToScrimsHistory()">
        Scrims History
      </button>
      <button 
        class="view-btn" 
        [class.active]="viewMode === 'archive'"
        (click)="switchToLeagueArchive()">
        League Archive
      </button>
    </div>
  </div>

  <!-- Scrims History View -->
  <div *ngIf="viewMode === 'current'" class="current-games-view">
    <app-scrim-filters 
      (searchChange)="onSearchChange($event)">
    </app-scrim-filters>

    <div class="scrims-list">
      <app-scrim-session 
        *ngFor="let session of filteredScrimSessions" 
        [scrimSession]="session">
      </app-scrim-session>
    </div>

    <div class="no-results" *ngIf="filteredScrimSessions.length === 0 && searchTerm">
      <p>No scrim sessions found matching your search.</p>
    </div>
  </div>

  <!-- League Archive View -->
  <div *ngIf="viewMode === 'archive'" class="archive-view">
    <app-scores-archive></app-scores-archive>
  </div>
</div>
