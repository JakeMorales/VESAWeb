<div class="games-container">
  <div class="wrap header-section">
    <p class="eyebrow"><span class="tick">▸</span> VESA // MATCH RECORDS</p>
    <h1>The archive<span class="dot">.</span></h1>
    <p class="lede">Every scrim lobby and every league match day, on record.</p>

    <!-- View Mode Switcher -->
    <div class="view-switcher">
      <div
        class="sliding-selector"
        [ngClass]="{
          'liquid-anim': selectorAnimating === 'forward',
          'liquid-anim-reverse': selectorAnimating === 'reverse'
        }"
        [style.transform]="viewMode === 'archive' ? 'translateX(100%)' : 'translateX(0)'">
      </div>
      <button
        class="view-btn"
        [class.active]="viewMode === 'current'"
        (click)="viewModeSetter = 'current'">
        Scrims History
      </button>
      <button
        class="view-btn"
        [class.active]="viewMode === 'archive'"
        [disabled]="!archiveEnabled"
        [title]="archiveEnabled ? '' : 'League Archive — coming soon'"
        (click)="viewModeSetter = 'archive'">
        League Archive <span *ngIf="!archiveEnabled" class="soon">(Coming soon)</span>
      </button>
    </div>
  </div>

  <!-- Scrims History View -->
  <div *ngIf="viewMode === 'current'" class="wrap current-games-view" @fadeSlide>
    <app-scrim-filters (searchChange)="onSearchChange($event)"></app-scrim-filters>
    <div *ngIf="loading" class="loading">Loading scrim records…</div>
    <div *ngIf="error" class="error">{{ error }}</div>
    <div class="scrims-list" *ngIf="!loading && !error">
      <ng-container *ngFor="let scrim of pagedScrims">
        <app-scrim-collapsible [file]="scrim.file" [matchResults]="scrim.matchResults"></app-scrim-collapsible>
      </ng-container>
      <app-modern-pagination [page]="page" [totalPages]="totalPages" (pageChange)="setPage($event)"></app-modern-pagination>
    </div>
    <div class="no-results" *ngIf="!loading && !error && pagedScrims.length === 0">
      <p>No scrim records found.</p>
    </div>
  </div>

  <!-- League Archive View -->
  <div *ngIf="viewMode === 'archive' && archiveEnabled" class="wrap archive-view" @fadeSlide>
    <app-scores-archive></app-scores-archive>
  </div>
</div>
