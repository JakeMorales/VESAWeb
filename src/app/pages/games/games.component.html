<div class="games-container">
  <div class="header-section">
    <h1>Match History</h1>
    <p>Complete record of all VESA league matches and scrimmages</p>
    
    <app-game-filters 
      (mapChange)="onMapChange($event)"
      (modeChange)="onModeChange($event)"
      (searchChange)="onSearchChange($event)">
    </app-game-filters>
  </div>

  <app-game-stats-overview [stats]="gameStats"></app-game-stats-overview>

  <div class="games-list">
    <app-game-card 
      *ngFor="let game of filteredGames | slice:0:displayedCount" 
      [game]="game">
    </app-game-card>
  </div>

  <div class="load-more" *ngIf="displayedCount < filteredGames.length">
    <button class="load-more-btn" (click)="loadMoreGames()">
      Load More Games
    </button>
  </div>
</div>
