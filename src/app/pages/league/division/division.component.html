<div class="loading-container" *ngIf="loading">
  <p>Loading division data...</p>
</div>

<div class="division-container" *ngIf="!loading && division" [style.--division-color]="division.color">
  <!-- Division Header -->
  <app-division-header
    [division]="division"
    [currentWeek]="currentWeek"
    [totalWeeks]="totalWeeks">
  </app-division-header>

  <!-- Current Match Section -->
  <app-current-match [currentMatch]="currentMatch" [streamChannel]="streamChannel"></app-current-match>

  <!-- Standings Table -->
  <app-division-standings [teams]="teams"></app-division-standings>

  <!-- Match History Section -->
  <app-match-history [matches]="matches" [season]="'Season 14'"></app-match-history>

  <!-- Division Info -->
  <app-division-info [division]="division"></app-division-info>
</div>

<div class="error-container" *ngIf="!loading && (error || !division)">
  <h2>Division Not Found</h2>
  <p>The requested division could not be found.</p>
  <a routerLink="/league/current-season" class="back-link">← Back to League</a>
</div>
