<div class="league-container">
  <!-- League Header -->
  <app-league-header
    [currentSeason]="currentSeason"
    [currentWeek]="currentWeek"
    [totalWeeks]="totalWeeks"
    [startDate]="startDate"
    [finalsDate]="finalsDate"
    [progressPercentage]="getProgressPercentage()"
    [progressLabel]="getProgressLabel()">
  </app-league-header>

  <!-- Divisions Grid -->
  <app-divisions-grid
    [divisions]="divisions"
    [totalWeeks]="totalWeeks">
  </app-divisions-grid>
</div>
