<div class="scrim-collapsible">
  <button class="collapsible-toggle" (click)="toggleExpand()" [attr.aria-expanded]="expanded">
    <span class="arrow" [class.expanded]="expanded">›</span>
    <span class="scrim-date">{{ getScrimDate(file) }}</span>
    <span class="scrim-chip">Scrim session</span>
  </button>
  <div class="collapsible-content" *ngIf="expanded">
    <app-match-day-table [matchResults]="matchResults"></app-match-day-table>
  </div>
</div>
